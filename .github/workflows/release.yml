name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build binaries
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          # ── Linux ─────────────────────────────────────────────
          - { goos: linux,   goarch: amd64,  suffix: linux-amd64        }
          - { goos: linux,   goarch: 386,    suffix: linux-386           }
          - { goos: linux,   goarch: arm64,  suffix: linux-arm64         }
          - { goos: linux,   goarch: arm,    goarm: 7, suffix: linux-armv7 }
          - { goos: linux,   goarch: arm,    goarm: 6, suffix: linux-armv6 }
          # ── macOS ─────────────────────────────────────────────
          - { goos: darwin,  goarch: amd64,  suffix: darwin-amd64       }
          - { goos: darwin,  goarch: arm64,  suffix: darwin-arm64        }
          # ── Windows ───────────────────────────────────────────
          - { goos: windows, goarch: amd64,  suffix: windows-amd64      }
          - { goos: windows, goarch: 386,    suffix: windows-386         }
          - { goos: windows, goarch: arm64,  suffix: windows-arm64       }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Build
        env:
          GOOS:   ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM:  ${{ matrix.goarm }}
          CGO_ENABLED: 0
        run: |
          BINARY="sxhttp-${{ matrix.suffix }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="${BINARY}.exe"
          fi
          go build -trimpath -ldflags="-s -w -X github.com/SentinelXofficial/sxhttp/internal/version.Current=${{ github.ref_name }}" -o "${BINARY}" .

      - name: Compress (Linux / macOS)
        if: matrix.goos != 'windows'
        run: |
          BINARY="sxhttp-${{ matrix.suffix }}"
          tar -czf "${BINARY}.tar.gz" "${BINARY}"
          sha256sum "${BINARY}.tar.gz" >> checksums.txt

      - name: Compress (Windows)
        if: matrix.goos == 'windows'
        run: |
          BINARY="sxhttp-${{ matrix.suffix }}.exe"
          zip "sxhttp-${{ matrix.suffix }}.zip" "${BINARY}"
          sha256sum "sxhttp-${{ matrix.suffix }}.zip" >> checksums.txt

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sxhttp-${{ matrix.suffix }}
          path: |
            sxhttp-*.tar.gz
            sxhttp-*.zip
            checksums.txt
          retention-days: 1

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Merge checksums
        run: |
          cat dist/checksums.txt | sort -k2 > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: sxhttp ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/sxhttp-*.tar.gz
            dist/sxhttp-*.zip
            checksums.txt
          body: |
            ## Install via Go

            ```bash
            go install github.com/SentinelXofficial/sxhttp@${{ github.ref_name }}
            ```

            ## Download binary

            | Platform | Arch | File |
            |----------|------|------|
            | Linux | amd64 | `sxhttp-linux-amd64.tar.gz` |
            | Linux | 386 | `sxhttp-linux-386.tar.gz` |
            | Linux | arm64 | `sxhttp-linux-arm64.tar.gz` |
            | Linux | armv7 | `sxhttp-linux-armv7.tar.gz` |
            | Linux | armv6 | `sxhttp-linux-armv6.tar.gz` |
            | macOS | amd64 | `sxhttp-darwin-amd64.tar.gz` |
            | macOS | arm64 (M1/M2) | `sxhttp-darwin-arm64.tar.gz` |
            | Windows | amd64 | `sxhttp-windows-amd64.zip` |
            | Windows | 386 | `sxhttp-windows-386.zip` |
            | Windows | arm64 | `sxhttp-windows-arm64.zip` |

            Verify with `checksums.txt` (SHA-256).
